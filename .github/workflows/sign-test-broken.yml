name: sign-test broken on purpose

on:
  workflow_dispatch:

permissions:
  contents: read
#  id-token: write

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Create a file to sign
        run: echo "hello supply chain, $(date)" > test.txt

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Check install!
        run: cosign version

      - name: Sign it
        run: |
          cosign sign-blob --yes \
            --bundle test.txt.bundle \
            test.txt

      - name: Upload signed file + bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-test-file
          path: |
            test.txt
            test.txt.bundle
