name: sign-checksums

on:
  # Only re-run when this workflow itself changes, plus manual dispatch. This
  # keeps the signing chain exercised without writing to the production Rekor
  # log on every unrelated commit.
  push:
    paths:
      - '.github/workflows/sign-checksums.yml'
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Create artifacts
        run: |
          echo "hello supply chain, $(date)" > artifact-a.txt
          echo "another artifact, $(date)" > artifact-b.txt

      - name: Generate checksums
        run: sha256sum artifact-a.txt artifact-b.txt > checksums.txt

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2


      - name: Check install!
        run: cosign version

      - name: Sign checksums.txt
        run: |
          cosign sign-blob --yes \
            --bundle checksums.txt.bundle \
            checksums.txt

      - name: Upload artifacts + bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-artifacts
          path: |
            artifact-a.txt
            artifact-b.txt
            checksums.txt
            checksums.txt.bundle

  verify:
    needs: sign
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download artifacts + bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signed-artifacts

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2


      - name: Verify signature
        run: |
          cosign verify-blob \
            --bundle checksums.txt.bundle \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/sign-checksums.yml@${{ github.ref }}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            checksums.txt

          echo "=== Rekor entry ==="
          echo "https://search.sigstore.dev/?logIndex=$(cat checksums.txt.bundle | jq -r '.verificationMaterial.tlogEntries[0].logIndex')"

          echo "=== Cert: identity + validity ==="
          cat checksums.txt.bundle | jq -r '.verificationMaterial.certificate.rawBytes' | base64 -d | openssl x509 -inform DER -noout -ext subjectAltName -dates
