name: sign-checksums

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: Create artifacts
        run: |
          echo "hello supply chain, $(date)" > artifact-a.txt
          echo "another artifact, $(date)" > artifact-b.txt

      - name: Generate checksums
        run: sha256sum artifact-a.txt artifact-b.txt > checksums.txt

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v3.1.1'

      - name: Check install!
        run: cosign version

      - name: Sign checksums.txt
        run: |
          cosign sign-blob --yes \
            --bundle checksums.txt.bundle \
            checksums.txt

      - name: Upload artifacts + bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-artifacts
          path: |
            artifact-a.txt
            artifact-b.txt
            checksums.txt
            checksums.txt.bundle
