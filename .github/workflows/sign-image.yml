name: sign-image

on:
  # Only re-run when this workflow itself changes, plus manual dispatch. This
  # keeps the signing chain exercised without writing to the production Rekor
  # log on every unrelated commit.
  push:
    paths:
      - '.github/workflows/sign-image.yml'
  workflow_dispatch:

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Write a trivial Dockerfile
        run: |
          cat <<'EOF' > Dockerfile
          FROM alpine:3.24.1
          RUN echo "hello supply chain" > /hello.txt
          EOF

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          # Buildx auto-attaches its own provenance attestation by default,
          # which docker pull chokes on ("unsupported media type
          # application/vnd.oci.empty.v1+json") and which shadows the real
          # image tag with an attestation-manifest tag. Same reason the real
          # release.yml disables this.
          provenance: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the image
        run: cosign sign --yes -d ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Attest SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

  verify:
    needs: build-and-sign
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify image signature
        run: |
          set -o pipefail  # so a cosign failure isn't masked by the jq pipe below
          echo "::group::Verify image signature (cosign verify)"
          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/sign-image.yml@${{ github.ref }}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            ghcr.io/${{ github.repository }}@${{ needs.build-and-sign.outputs.digest }} | jq '.[0].optional'
          echo "✓ cosign verify succeeded"
          echo "::endgroup::"

          echo "::group::Attached signatures + attestations (cosign tree)"
          cosign tree ghcr.io/${{ github.repository }}@${{ needs.build-and-sign.outputs.digest }}
          echo "::endgroup::"

      - name: Verify SLSA provenance (gh)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::group::Verify SLSA provenance (gh attestation verify)"
          gh attestation verify oci://ghcr.io/${{ github.repository }}@${{ needs.build-and-sign.outputs.digest }} --owner "${{ github.repository_owner }}"
          echo "✓ gh attestation verify (provenance) succeeded"
          echo "::endgroup::"

      - name: Verify SLSA provenance (gh download + cosign)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DIGEST_HEX=$(echo "${{ needs.build-and-sign.outputs.digest }}" | sed 's/sha256://')

          echo "::group::Download provenance bundle (gh attestation download)"
          # `gh attestation download` has no output-file flag; `-o` is the
          # shorthand for --owner. It writes to a file named after the subject
          # digest (sha256:<hex>.jsonl) in the current directory. Clear any stale
          # copy first so a later step can't pick up an earlier download. Filter
          # by predicate type so the file holds only the provenance, not the SBOM
          # attestation that shares this digest.
          rm -f "sha256:${DIGEST_HEX}.jsonl"
          gh attestation download oci://ghcr.io/${{ github.repository }}@${{ needs.build-and-sign.outputs.digest }} --owner "${{ github.repository_owner }}" \
            --predicate-type https://slsa.dev/provenance/v1

          # Take the first Sigstore bundle line for cosign.
          head -n1 "sha256:${DIGEST_HEX}.jsonl" > provenance.bundle
          echo "::endgroup::"

          echo "::group::Verify provenance with cosign"
          cosign verify-blob-attestation \
            --bundle provenance.bundle \
            --new-bundle-format \
            --type slsaprovenance1 \
            --digest "$DIGEST_HEX" \
            --digestAlg sha256 \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/sign-image.yml@${{ github.ref }}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          echo "✓ cosign verify-blob-attestation (provenance) succeeded"
          echo "::endgroup::"

      - name: Verify SBOM attestation (gh)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::group::Verify SBOM attestation (gh attestation verify)"
          gh attestation verify oci://ghcr.io/${{ github.repository }}@${{ needs.build-and-sign.outputs.digest }} --owner "${{ github.repository_owner }}" \
            --predicate-type https://spdx.dev/Document/v2.3
          echo "✓ gh attestation verify (SBOM) succeeded"
          echo "::endgroup::"

      - name: Verify SBOM attestation (gh download + cosign)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DIGEST_HEX=$(echo "${{ needs.build-and-sign.outputs.digest }}" | sed 's/sha256://')

          echo "::group::Download SBOM bundle (gh attestation download)"
          # `gh attestation download` has no output-file flag; `-o` is the
          # shorthand for --owner. It writes to a file named after the subject
          # digest (sha256:<hex>.jsonl) in the current directory. Clear the
          # provenance download from the earlier step so we only read the SBOM.
          # The predicate type is version-suffixed (SPDX 2.3) and gh matches it
          # exactly, so the bare https://spdx.dev/Document finds nothing.
          rm -f "sha256:${DIGEST_HEX}.jsonl"
          gh attestation download oci://ghcr.io/${{ github.repository }}@${{ needs.build-and-sign.outputs.digest }} --owner "${{ github.repository_owner }}" \
            --predicate-type https://spdx.dev/Document/v2.3

          # Take the first Sigstore bundle line for cosign.
          head -n1 "sha256:${DIGEST_HEX}.jsonl" > sbom.bundle
          echo "::endgroup::"

          echo "::group::Verify SBOM with cosign"
          cosign verify-blob-attestation \
            --bundle sbom.bundle \
            --new-bundle-format \
            --type https://spdx.dev/Document/v2.3 \
            --digest "$DIGEST_HEX" \
            --digestAlg sha256 \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/sign-image.yml@${{ github.ref }}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          echo "✓ cosign verify-blob-attestation (SBOM) succeeded"
          echo "::endgroup::"
