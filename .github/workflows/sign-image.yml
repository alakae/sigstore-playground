name: sign-image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # governs secrets.GITHUB_TOKEN's ability to push to GHCR
  id-token: write    # governs whether the OIDC ID token can be minted at all
  attestations: write        # actions/attest needs this to persist attestations
  artifact-metadata: write   # actions/attest needs this to record the artifact
jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Write a trivial Dockerfile
        run: |
          cat <<'EOF' > Dockerfile
          FROM alpine:3.24.1
          RUN echo "hello supply chain" > /hello.txt
          EOF

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          # Buildx auto-attaches its own provenance attestation by default,
          # which docker pull chokes on ("unsupported media type
          # application/vnd.oci.empty.v1+json") and which shadows the real
          # image tag with an attestation-manifest tag. Same reason the real
          # release.yml disables this.
          provenance: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the image
        run: cosign sign --yes -d ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}

      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Attest SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true
