name: sign-image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # governs secrets.GITHUB_TOKEN's ability to push to GHCR
  id-token: write    # governs whether the OIDC ID token can be minted at all
jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Write a trivial Dockerfile
        run: |
          cat <<'EOF' > Dockerfile
          FROM alpine:3.24.1
          RUN echo "hello supply chain" > /hello.txt
          EOF

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          # Buildx auto-attaches its own provenance attestation by default,
          # which docker pull chokes on ("unsupported media type
          # application/vnd.oci.empty.v1+json") and which shadows the real
          # image tag with an attestation-manifest tag. Same reason the real
          # release.yml disables this.
          provenance: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the image
        run: cosign sign --yes -d ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
