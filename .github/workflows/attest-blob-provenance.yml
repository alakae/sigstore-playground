name: attest-blob-provenance

on:
  push:
  workflow_dispatch:

jobs:
  attest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Create artifact
        run: echo "hello supply chain, $(date)" > artifact.txt

      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: artifact.txt

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: attested-artifact
          path: artifact.txt

  verify:
    needs: attest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: attested-artifact

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2


      - name: Verify attestation (gh)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "# locally: gh attestation verify artifact.txt --owner ${{ github.repository_owner }}"
          gh attestation verify artifact.txt --owner "${{ github.repository_owner }}"

      - name: Verify attestation (gh download + cosign)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # `gh attestation download` has no output-file flag; `-o` is the
          # shorthand for --owner. It writes the attestations itself to a
          # JSON-lines file named after the artifact digest (sha256:<hex>.jsonl)
          # in the current directory.
          gh attestation download artifact.txt --owner "${{ github.repository_owner }}"

          # Each line is a Sigstore bundle; take the first for cosign and the
          # cert inspection below.
          bundle_file=$(ls -- *.jsonl | head -n1)
          head -n1 "$bundle_file" > provenance.bundle

          # The download uses the new Sigstore protobuf bundle format, so
          # cosign needs --new-bundle-format to parse it.
          cosign verify-blob-attestation \
            --bundle provenance.bundle \
            --new-bundle-format \
            --type slsaprovenance1 \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/attest-blob-provenance.yml@${{ github.ref }}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            artifact.txt

          echo "=== Cert: identity + validity ==="
          cat provenance.bundle | jq -r '.verificationMaterial.certificate.rawBytes' | base64 -d | openssl x509 -inform DER -noout -ext subjectAltName -dates
