name: custom-attestation

on:
  push:
  workflow_dispatch:

jobs:
  attest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Create artifact
        run: echo "hello supply chain, $(date)" > artifact.txt

      - name: Create custom predicate
        run: |
          cat <<'EOF' > predicate.json
          {"nothing": "to see here"}
          EOF

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2


      - name: Attest blob with custom predicate
        run: |
          cosign attest-blob \
            --predicate predicate.json \
            --type https://github.com/alakae/sigstore-playground/nothing/v1 \
            --bundle attestation.bundle \
            --yes \
            artifact.txt

      - name: Inspect predicate (debug)
        run: |
          echo "=== Raw predicate ==="
          cat predicate.json
          echo "=== Decoded attestation payload ==="
          cat attestation.bundle | jq -r '.dsseEnvelope.payload' | base64 -d | jq .

      - name: Upload artifacts + bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: custom-attestation-artifacts
          path: |
            artifact.txt
            predicate.json
            attestation.bundle

  verify:
    needs: attest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download artifacts + bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: custom-attestation-artifacts

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2


      - name: Verify attestation
        run: |
          cosign verify-blob-attestation \
            --bundle attestation.bundle \
            --type https://github.com/alakae/sigstore-playground/nothing/v1 \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/custom-attestation.yml@${{ github.ref }}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            artifact.txt

          echo "=== Rekor entry (cert details visible in UI) ==="
          echo "https://search.sigstore.dev/?logIndex=$(cat attestation.bundle | jq -r '.verificationMaterial.tlogEntries[0].logIndex')"
