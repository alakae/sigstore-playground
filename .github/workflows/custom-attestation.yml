name: custom-attestation

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - name: Create artifact
        run: echo "hello supply chain, $(date)" > artifact.txt

      - name: Create custom predicate
        run: |
          cat <<'EOF' > predicate.json
          {"nothing": "to see here"}
          EOF

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v3.1.1'

      - name: Attest blob with custom predicate
        run: |
          cosign attest-blob \
            --predicate predicate.json \
            --type https://github.com/alakae/sigstore-playground/nothing/v1 \
            --bundle attestation.bundle \
            --yes \
            artifact.txt

      - name: Inspect predicate (debug)
        run: |
          echo "=== Raw predicate ==="
          cat predicate.json
          echo "=== Decoded attestation payload ==="
          cat attestation.bundle | jq -r '.dsseEnvelope.payload' | base64 -d | jq .

      - name: Upload artifacts + bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: custom-attestation-artifacts
          path: |
            artifact.txt
            predicate.json
            attestation.bundle
